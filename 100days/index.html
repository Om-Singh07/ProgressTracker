<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Progress Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- LEFT PANEL -->
    <div class="left">
        <h2>My Tasks</h2>

        <form id="taskForm">
            <input type="text" id="taskInput" placeholder="Add new task...">
        </form>

        <ul id="taskList"></ul>

        <h3>Library</h3>
        <input type="text" id="searchInput" placeholder="Search...">
        <ul id="libraryList"></ul>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">

        <!-- 🔥 TOP LEFT BUTTONS -->
        <div class="top-controls">
            <button id="profileBtn">Profile</button>
            <button id="logoutBtn">Logout</button>
        </div>

        <!-- CENTER HEADER -->
        <div class="header-center">
            <h1 id="selectedTaskTitle">Progress</h1>
            <div id="currentTask"></div>
        </div>

        <!-- PROGRESS TEXT -->
        <p id="progressText"></p>

        <!-- DAYS GRID -->
        <div id="daysContainer"></div>

    </div>

</div>

<!-- =========================
     NOTE MODAL
========================= -->
<div id="noteModal" class="modal">
  <div class="modal-content">
    <h2 id="noteTitle">Day Note</h2>
    <textarea id="noteInput" placeholder="Write your note here..."></textarea>
    <div class="modal-buttons">
      <button id="saveNote">Save</button>
      <button id="closeNote">Close</button>
    </div>
  </div>
</div>

<!-- =========================
     PASSWORD MODAL
========================= -->
<div id="passwordModal" class="modal">
  <div class="modal-content">
    <h2 id="passwordTitle">Enter Password</h2>
    <input type="password" id="passwordInput" placeholder="Enter password..." />
    
    <div class="modal-buttons">
      <button id="savePassword">Save</button>
      <button id="closePassword">Close</button>
    </div>
  </div>
</div>

<script src="modules/utils/storage.js"></script>
<script src="modules/utils/helpers.js"></script>

<script src="modules/auth/session.js"></script>

<script src="modules/tasks/tasks.js"></script>
<script src="modules/tasks/tasksUI.js"></script>

<script src="modules/progress/progress.js"></script>
<script src="modules/progress/daysUI.js"></script>

<script src="modules/notes/notes.js"></script>

<script src="script.js"></script>


</body>
</html>
